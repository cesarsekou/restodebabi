<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Tracking | The Sensory Brew</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed": "#2b1613",
                    "surface-container-low": "#fbf3e4",
                    "on-surface": "#1e1b13",
                    "outline": "#827470",
                    "on-secondary": "#ffffff",
                    "primary": "#5f1600",
                    "inverse-primary": "#ffb59f",
                    "tertiary": "#47281e",
                    "outline-variant": "#d4c3be",
                    "secondary-fixed": "#ffdad4",
                    "error-container": "#ffdad6",
                    "secondary": "#745853",
                    "on-primary-fixed-variant": "#852300",
                    "on-primary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "surface-dim": "#e1d9cb",
                    "on-tertiary-container": "#daaa9b",
                    "on-secondary-container": "#795c57",
                    "surface-container": "#f5edde",
                    "secondary-fixed-dim": "#e3beb8",
                    "primary-fixed": "#ffdbd0",
                    "surface-bright": "#fff8ef",
                    "on-primary-container": "#ff9b7d",
                    "primary-container": "#862300",
                    "on-tertiary-fixed-variant": "#613e33",
                    "surface": "#fff8ef",
                    "inverse-surface": "#343026",
                    "on-error-container": "#93000a",
                    "primary-fixed-dim": "#ffb59f",
                    "tertiary-container": "#613e33",
                    "tertiary-fixed": "#ffdbd0",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed-dim": "#edbbac",
                    "on-tertiary-fixed": "#2f140b",
                    "on-background": "#1e1b13",
                    "on-secondary-fixed-variant": "#5b403c",
                    "secondary-container": "#fed7d0",
                    "surface-tint": "#ac3509",
                    "inverse-on-surface": "#f8f0e1",
                    "surface-variant": "#e9e2d3",
                    "on-surface-variant": "#504441",
                    "on-primary-fixed": "#3a0a00",
                    "background": "#fff8ef",
                    "error": "#ba1a1a",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#e9e2d3",
                    "surface-container-high": "#efe7d9"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; background-color: #fff8ef; }
        .glass-panel {
            background: rgba(255, 248, 239, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .text-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .step-active {
            box-shadow: 0 0 15px rgba(172, 53, 9, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased overflow-hidden">
<!-- Full Screen Map Background -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover grayscale opacity-40" data-alt="Detailed artistic map of a metropolitan city with soft warm sepia tones and coffee bean icons representing cafe locations" data-location="Seattle, Washington" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUMitSB64w6CERECJVLU_GtJnQCvdj3lOU3U4TJZgDcDjAy6AdK_ukwy4Vox2HrTaieOTxOkxpQu_XivQKRBx_6-Uqq2oI--FXCsS95g89xkvQDd2NveIo4AsiNzVoYsub72U6pl43syR5J-HKrxtZFeC97a4HZ0mBhQ3kNkb3TuSiQoDrCj9btX7eag4BmKMQs-CVF0UgS8e5xHQ-gHbPE1m0sTB2xL6ZzmFL3m6qJFafqZXNCjN72GKr-Tgv4h2ud8HoNTsMJKU"/>
<!-- Overlay Gradient for legibility -->
<div class="absolute inset-0 bg-gradient-to-b from-background/40 via-transparent to-background/60"></div>
</div>
<!-- Header / Top Bar (Manual Suppression of Shared TopAppBar for task focus) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-8 pointer-events-none">
<div class="pointer-events-auto bg-surface-container/80 backdrop-blur-md p-3 rounded-full shadow-lg">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</div>
<div class="flex flex-col items-center flex-1">
<h1 class="text-headline font-extrabold text-2xl text-primary tracking-tight">Order Tracking</h1>
<p class="font-body text-xs font-semibold opacity-70 uppercase tracking-widest">Order #4429-CB</p>
</div>
<div class="w-12 h-12 flex items-center justify-center pointer-events-auto bg-surface-container/80 backdrop-blur-md rounded-full shadow-lg">
<span class="material-symbols-outlined text-primary">help_outline</span>
</div>
</header>
<!-- Main Navigation Layer (Floating Content) -->
<main class="relative z-10 flex flex-col justify-between h-screen p-6 pt-24 pb-32">
<!-- Top Section: Arrival Time & Progress -->
<div class="space-y-6">
<!-- Time Card -->
<div class="glass-panel rounded-lg p-6 shadow-2xl flex items-center justify-between">
<div>
<h2 class="font-body text-on-surface-variant text-sm font-medium">Estimated Arrival</h2>
<p class="text-headline font-extrabold text-4xl text-primary mt-1">12-15 <span class="text-xl font-bold opacity-80">mins</span></p>
</div>
<div class="bg-primary-container p-4 rounded-xl">
<span class="material-symbols-outlined text-on-primary text-3xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">timer</span>
</div>
</div>
<!-- Enhanced Progress Bar -->
<div class="glass-panel rounded-lg p-6 shadow-2xl">
<div class="flex justify-between mb-4">
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white step-active">
<span class="material-symbols-outlined text-sm">check</span>
</div>
<span class="font-body text-[10px] font-bold text-primary">Confirmed</span>
</div>
<div class="flex-1 flex items-center px-2">
<div class="h-1 w-full bg-primary/20 rounded-full relative">
<div class="absolute left-0 top-0 h-full w-[80%] bg-primary rounded-full"></div>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white step-active">
<span class="material-symbols-outlined text-sm">coffee</span>
</div>
<span class="font-body text-[10px] font-bold text-primary">Preparing</span>
</div>
<div class="flex-1 flex items-center px-2">
<div class="h-1 w-full bg-primary/20 rounded-full"></div>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-sm">moped</span>
</div>
<span class="font-body text-[10px] font-bold text-on-surface-variant opacity-60">Delivery</span>
</div>
</div>
<div class="bg-surface-container/30 px-4 py-2 rounded-full inline-flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary-container animate-pulse"></span>
<span class="font-body text-xs font-semibold text-primary">Barista is perfecting your brew...</span>
</div>
</div>
</div>
<!-- Middle Section: Dynamic Visuals (Simulated Map Markers) -->
<div class="flex-1 relative">
<div class="absolute top-1/2 left-1/3 transform -translate-x-1/2 -translate-y-1/2">
<div class="relative">
<div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center shadow-2xl z-10 relative">
<span class="material-symbols-outlined text-white">person_pin_circle</span>
</div>
<div class="absolute inset-0 bg-primary/30 rounded-full scale-150 animate-ping"></div>
</div>
</div>
<div class="absolute top-[40%] right-[20%]">
<div class="w-10 h-10 bg-on-surface-variant rounded-full flex items-center justify-center shadow-xl border-2 border-white">
<span class="material-symbols-outlined text-white text-sm">local_cafe</span>
</div>
</div>
</div>
<!-- Bottom Section: Driver Information Card -->
<div class="glass-panel rounded-lg p-5 shadow-2xl flex items-center gap-4">
<div class="relative">
<img class="w-16 h-16 rounded-2xl object-cover border-2 border-white/40" data-alt="Headshot of a friendly young male delivery driver named Mike with a warm smile and professional demeanor" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA2rCQX_6sq4LjIQdAKTnVO4UPPD_RQE8Oz4LotuS1U3CKvAh4SjDw2g7MFYIY54vXGd5Q4219nD2-ZlxDDp_hE5su9a0K1hSkz6g9mRJLkfixK8eZTR8so8-r2VKr43IeDO3HKxPkeGX3TxeM-MOv-1YjFu8WABrzPfCf9uvFhHJicWT8vXsaHflkyORdwZmKrAV6dCVTCQR8DHcXEjlaSg3P5XZ2lWGG9hJbbBfwNh7ZpQUD6oGTkHxVbWbqmHfRSvc_2f2G83pU"/>
<div class="absolute -bottom-2 -right-2 bg-primary px-2 py-0.5 rounded-full border-2 border-surface flex items-center gap-1">
<span class="material-symbols-outlined text-[10px] text-white" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-[10px] font-bold text-white">4.9</span>
</div>
</div>
<div class="flex-1">
<h3 class="font-headline font-bold text-lg text-on-surface leading-tight">Mike</h3>
<p class="font-body text-sm text-on-surface-variant opacity-80">Your Delivery Sommelier</p>
</div>
<div class="flex gap-2">
<button class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">chat</span>
</button>
<button class="w-12 h-12 rounded-full bg-primary flex items-center justify-center text-white shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">call</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed based on Transactional Task rule) -->
<!-- The BottomNavBar is hidden here as per the "Task-Focused" rule in system instructions -->
<!-- Optional Floating Action Button (Suppressed for focused task) -->
</body></html>

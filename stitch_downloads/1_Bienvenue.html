<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-overlay {
            background: rgba(255, 248, 239, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.2);

<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Main Entry Canvas -->
<main class="relative h-screen w-full flex flex-col justify-end overflow-hidden">
<!-- Background Image with Tonal Overlay -->
<div class="absolute inset-0 z-0">
<img alt="Coffee Art" class="w-full h-full object-cover" data-alt="close-up of intricate heart-shaped latte art in a ceramic cup with soft morning light and warm steam rising" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCXgSHFhFd3ogXxsmz1pv1rJAPiqssZVwsl5MOIsuLTckU3x0HcKTnRm42A2sz1Vyr8Ek0fkSGmloyU7blBjg7wkYSJ4kBKCCDPZjSYn6A1DQKEMF1XJItKVvPFqmM2zTcmFmXDsyl0xs4COmBKcjBFiHimLZasDtSnRPsa2oyG4LFyCtERFoqGO36tS8OL_OtXou8jnmMtQ3TCTlwWhQMS6K5QuyC0OnDjWXXQulkGvNpV93Wg3aLNfbM_gOoiFjBse06UPsIA_gY"/>
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-[#1e1b13]/40"></div>
<div class="absolute inset-0 hero-gradient"></div>
</div>
<!-- Brand Identity Floating Anchor -->
<div class="absolute top-12 left-0 w-full px-8 z-10 flex flex-col items-center">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-surface-tint" style="font-variation-settings: 'FILL' 1;">coffee</span>
<span class="font-headline font-extrabold text-2xl tracking-tighter text-on-surface">The Sensory Brew</span>
</div>
<div class="h-[2px] w-12 bg-surface-tint rounded-full opacity-60"></div>
</div>
<!-- Glassmorphic Entry Card -->
<div class="relative z-20 px-6 pb-12">
<div class="glass-overlay rounded-lg p-8 shadow-[0_32px_64px_rgba(30,27,19,0.15)] flex flex-col items-center text-center max-w-lg mx-auto">
<!-- Editorial Tagline -->
<h1 class="font-headline text-[2.75rem] leading-[1.1] font-extrabold text-on-surface tracking-tight mb-4">
                    Experience the <span class="text-surface-tint">Joy</span> of Coffee in Every Blissful Sip!
                </h1>
<!-- Body Content -->
<p class="font-body text-lg text-on-surface-variant/90 leading-relaxed mb-10 max-w-[320px]">
                    Discover the world's most aromatic beans and curate your perfect brewing ritual.
                </p>
<!-- Primary CTA -->
<button class="group relative w-full overflow-hidden rounded-full bg-surface-tint py-5 px-8 flex items-center justify-center transition-all duration-300 active:scale-95 shadow-lg shadow-surface-tint/20">
<span class="font-label font-bold text-lg text-on-primary mr-2">Get Started</span>
<span class="material-symbols-outlined text-on-primary group-hover:translate-x-1 transition-transform">arrow_forward</span>
<!-- Hover Shine Effect -->
<div class="absolute inset-0 -translate-x-full group-hover:translate-x-full transition-transform duration-700 bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
</button>
<!-- Secondary Option -->
<div class="mt-6">
<button class="font-label text-sm font-semibold text-on-surface opacity-70 hover:opacity-100 transition-opacity uppercase tracking-widest">
                        Skip for now
                    </button>
</div>
</div>
</div>
<!-- Decorative Floating Elements -->
<div class="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-surface-tint/10 rounded-full blur-[100px] z-10 pointer-events-none"></div>
<div class="absolute top-[20%] left-[-5%] w-48 h-48 bg-primary-container/10 rounded-full blur-[80px] z-10 pointer-events-none"></div>
</main>
<!-- Suppressed Navigation Shell for Focused Entry Intent -->
<!-- (No SideNav or BottomNavBar as per the 'Destination Rule' for Welcome screens) -->
